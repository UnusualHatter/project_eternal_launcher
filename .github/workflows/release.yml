# release.yml — Build, package, and publish a signed installer on every tag.
#
# Trigger: push a version tag, e.g.  git tag v1.0.0 && git push --tags
#
# Required secrets (Settings → Secrets → Actions):
#   SIGNPATH_API_TOKEN      — from signpath.io (free for OSS)
#   SIGNPATH_ORG_ID         — your SignPath organization ID
#
# If you don't have a code-signing cert yet, remove the two "Sign" steps and
# the installer will still build and upload — just unsigned.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # v1.0.0, v1.2.3, etc.

permissions:
  contents: write     # needed to create a GitHub Release

jobs:
  build-installer:
    name: Build & Package
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Parse version from tag (strips the leading "v") ──────────────────
      - name: Parse version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"        # e.g. v1.0.0
          $ver = $tag.TrimStart('v')              # e.g. 1.0.0
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"     >> $env:GITHUB_OUTPUT

      # ── .NET 8 SDK ────────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Publish (single-file, no PDB) ─────────────────────────────────────
      - name: Publish
        shell: pwsh
        run: |
          scripts/publish.ps1 -Version "${{ steps.version.outputs.VERSION }}"

      # ── Sign binaries (skip if no cert) ───────────────────────────────────
      # Requires a free SignPath.io OSS account and a "release-signing" policy.
      # Comment out this step if you don't have a cert yet.
      - name: Sign binaries (SignPath)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:                   ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id:             ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug:                eternal-tf2-launcher
          signing-policy-slug:         release-signing
          artifact-configuration-slug: executables
          github-artifact-id:          publish-output
          wait-for-completion:         true
          output-artifact-directory:   installer/publish

      # ── Patch installer version ───────────────────────────────────────────
      - name: Update installer version
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $file = "installer\installer.iss"
          (Get-Content $file) -replace '(#define AppVersion\s+")[^"]*(")', "`${1}$ver`$2" |
            Set-Content $file
          Write-Host "installer.iss AppVersion set to $ver"

      # ── Build installer (Inno Setup) ──────────────────────────────────────
      - name: Build installer
        shell: cmd
        run: |
          :: iscc.exe is on PATH in windows-latest via Inno Setup pre-install
          iscc "installer\installer.iss"

      # ── Sign installer ────────────────────────────────────────────────────
      - name: Sign installer (SignPath)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:                   ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id:             ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug:                eternal-tf2-launcher
          signing-policy-slug:         release-signing
          artifact-configuration-slug: installer
          github-artifact-id:          installer-unsigned
          wait-for-completion:         true
          output-artifact-directory:   installer/Output

      # ── Upload installer as workflow artifact (for review/download) ────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ steps.version.outputs.TAG }}
          path: installer/Output/EternalTF2Launcher-Setup-*.exe
          retention-days: 30

      # ── Create GitHub Release with the installer attached ──────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Eternal TF2 Launcher ${{ steps.version.outputs.TAG }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          generate_release_notes: true
          files: |
            installer/Output/EternalTF2Launcher-Setup-*.exe
